<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Integral CF';
    src: url('https://db.onlinewebfonts.com/t/6004a4ec4b1a58b13bf8826f18fbd8fc.woff2') format('woff2'),
         url('https://db.onlinewebfonts.com/t/6004a4ec4b1a58b13bf8826f18fbd8fc.woff') format('woff');
    font-weight: normal;
    font-style: normal;
  }
</style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060608;
    --fg: #e8e4dc;
    --accent: #c8a97e;
    --muted: #3a3830;
    --glow: rgba(200, 169, 126, 0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: #080809;
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor dot */
  #cursor-ring {
    position: fixed;
    width: 6px; height: 6px;
    background: rgba(200,169,126,0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  a, button { cursor: none; }



  /* Main layout */
  main {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Name */
  .name-wrap {
    position: relative;
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }
  .name-card {
    position: fixed;
    transform: translate(12px, 12px);
    background: rgba(10,10,12,0.92);
    border: 1px solid rgba(200,169,126,0.15);
    border-radius: 4px;
    padding: 0.45rem 0.7rem;
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    white-space: nowrap;
    z-index: 100;
  }
  .name-wrap:hover .name-card {
    opacity: 1;
  }
  .name-card-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.06em;
    color: rgba(232,228,220,0.85);
  }
  .name {
    font-size: clamp(1.1rem, 2.2vw, 2rem);
    font-family: 'Integral CF', 'Space Mono', monospace;
    font-weight: normal;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--fg);
    position: relative;
    user-select: none;
  }
  .name::before {
    display: none;
  }
  .name:hover::before {
    display: none;
  }
  /* Thin divider */
  .divider {
    width: 0px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 0.9rem 0 0.9rem;
    opacity: 0;
    align-self: center;
    animation: line-expand 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }
  @keyframes line-expand {
    to { width: 350px; opacity: 0.6; }
  }
  /* Buttons */
  .buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-top: 0;
    opacity: 0;
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    overflow: visible;
  }

  @property --a {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: rgba(232, 228, 220, 0.5);
    text-decoration: none;
    border-radius: 50%;
    cursor: none;
    position: relative;
    transition: color 0.3s ease;
    isolation: isolate;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: conic-gradient(
      from var(--a),
      rgba(200,169,126,0) 0%,
      rgba(200,169,126,0) 35%,
      rgba(200,169,126,0.5) 50%,
      rgba(240,215,165,1) 60%,
      rgba(200,169,126,0.5) 70%,
      rgba(200,169,126,0) 85%,
      rgba(200,169,126,0) 100%
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 1px;
    animation: spin-angle 5s linear infinite;
    opacity: 0.7;
    transition: opacity 0.3s ease;
  }

  .btn:hover::before { opacity: 1; }
  .btn:hover { color: rgba(200,169,126,0.95); }
  .btn::after { display: none; }
  .btn .corner-tr, .btn .corner-bl { display: none; }
  .btn span:not(.corner-tr):not(.corner-bl) { display: none; }
  .btn svg { position: relative; z-index: 1; width: 16px; height: 16px; }

  @keyframes spin-angle {
    from { --a: 0deg; }
    to   { --a: 360deg; }
  }

  /* Audio wrap */
  .audio-wrap {
    position: fixed;
    top: 2rem;
    left: 2rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    opacity: 0;
    animation: rise 0.5s ease 1.6s forwards;
  }

  /* Audio button */
  .audio-btn {
    width: 36px; height: 36px;
    border: 1px solid rgba(232,228,220,0.1);
    background: rgba(232,228,220,0.03);
    border-radius: 2px;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
    backdrop-filter: blur(4px);
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
  }
  .audio-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(6,6,8,0.35);
    transition: background 0.3s;
  }
  .audio-btn:hover::after {
    background: rgba(6,6,8,0.2);
  }
  .audio-btn .bars {
    position: relative;
    z-index: 1;
  }
  .audio-btn:hover {
    border-color: rgba(200,169,126,0.4);
  }
  .skip-btn {
    width: 28px; height: 28px;
    border: 1px solid rgba(232,228,220,0.1);
    background: rgba(232,228,220,0.03);
    border-radius: 2px;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232,228,220,0.4);
    transition: border-color 0.3s, background 0.3s, color 0.3s;
    backdrop-filter: blur(4px);
  }
  .skip-btn:hover {
    border-color: rgba(200,169,126,0.4);
    background: rgba(200,169,126,0.06);
    color: rgba(200,169,126,0.8);
  }

  /* Song hover card */
  .song-card {
    position: absolute;
    top: calc(100% + 0.6rem);
    left: 0;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    background: rgba(10,10,12,0.92);
    border: 1px solid rgba(200,169,126,0.15);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    width: 200px;
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0.4rem;
  }
  .vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(200,169,126,0.2);
    border-radius: 2px;
    outline: none;
    cursor: none;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    cursor: none;
    transition: transform 0.15s;
  }
  .vol-slider::-webkit-slider-thumb:hover {
    transform: scale(1.4);
  }
  .vol-slider::-moz-range-thumb {
    width: 8px;
    height: 8px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: none;
  }

  .audio-wrap:hover .song-card {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .song-thumb {
    width: 36px; height: 36px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(200,169,126,0.08);
  }
  .song-info {
    overflow: hidden;
  }
  .song-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    color: rgba(232,228,220,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .song-artist {
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.05em;
    color: rgba(200,169,126,0.5);
    margin-top: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .audio-btn.playing .bar { animation-play-state: running; }
  .bars {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 12px;
  }
  .bar {
    width: 2px;
    background: rgba(200,169,126,0.7);
    border-radius: 1px;
    animation: bar-dance 0.8s ease-in-out infinite alternate;
    animation-play-state: paused;
  }
  .bar:nth-child(1) { height: 4px;  animation-duration: 0.6s; }
  .bar:nth-child(2) { height: 10px; animation-duration: 0.9s; }
  .bar:nth-child(3) { height: 6px;  animation-duration: 0.5s; }
  .bar:nth-child(4) { height: 12px; animation-duration: 0.7s; }
  .bar:nth-child(5) { height: 5px;  animation-duration: 1s; }
  @keyframes bar-dance {
    from { transform: scaleY(0.3); opacity: 0.5; }
    to   { transform: scaleY(1);   opacity: 1; }
  }
  /* static icon when not playing */
  .audio-btn:not(.playing) .bars { opacity: 0.35; }

  /* Social tooltip card */
  .btn {
    position: relative;
  }
  .social-card {
    position: absolute;
    top: calc(100% + 0.6rem);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    background: rgba(10,10,12,0.92);
    border: 1px solid rgba(200,169,126,0.15);
    border-radius: 4px;
    padding: 0.45rem 0.7rem;
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
    z-index: 100;
  }
  .btn:hover .social-card {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .social-card-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.06em;
    color: rgba(232,228,220,0.85);
  }
  .social-card-platform {
    font-family: 'Space Mono', monospace;
    font-size: 0.48rem;
    letter-spacing: 0.05em;
    color: rgba(200,169,126,0.5);
    margin-top: 0.1rem;
  }

  /* Coord label */
  .coord {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(232,228,220,0.18);
    text-decoration: none;
    opacity: 0;
    animation: rise 0.5s ease 1.7s forwards;
    transition: color 0.3s ease;
  }
  .coord:hover { color: rgba(200,169,126,0.5); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 3D tilt canvas */
  #tilt {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>

<script>
  // Cursor dot
  const ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => {
    ring.style.left = e.clientX + 'px';
    ring.style.top  = e.clientY + 'px';
  });

  // Canvas — stars + comet trail
  const canvas = document.getElementById('tilt');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  // --- Drifting stars ---
  const STAR_COUNT = 260;
  const driftStars = Array.from({ length: STAR_COUNT }, () => ({
    x: Math.random() * (W || 1920),
    y: Math.random() * (H || 1080),
    r: Math.random() * 0.9 + 0.1,
    a: Math.random() * 0.55 + 0.15,
    vx: (Math.random() - 0.5) * 0.18,
    vy: (Math.random() - 0.5) * 0.18,
    // twinkle
    ta: Math.random(),
    ts: Math.random() * 0.008 + 0.003,
    td: 1,
  }));

  // --- Comet trail ---
  let mouseX = W / 2, mouseY = H / 2;
  let smoothX = W / 2, smoothY = H / 2;
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  const trail = [];
  const TRAIL_LEN = 42;

  function loop() {
    ctx.clearRect(0, 0, W, H);

    // draw + drift stars
    driftStars.forEach(s => {
      s.x += s.vx;
      s.y += s.vy;
      // wrap around edges
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;
      if (s.y < 0) s.y = H;
      if (s.y > H) s.y = 0;
      // gentle twinkle
      s.ta += s.ts * s.td;
      if (s.ta >= 1 || s.ta <= 0) s.td *= -1;
      const alpha = s.a * (0.6 + s.ta * 0.4);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    // comet trail
    smoothX += (mouseX - smoothX) * 0.18;
    smoothY += (mouseY - smoothY) * 0.18;
    trail.unshift({ x: smoothX, y: smoothY });
    if (trail.length > TRAIL_LEN) trail.length = TRAIL_LEN;

    if (trail.length >= 2) {
      for (let i = 1; i < trail.length; i++) {
        const t = 1 - i / trail.length;
        ctx.beginPath();
        ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.strokeStyle = `rgba(200,169,126,${t * 0.5})`;
        ctx.lineWidth = t * 2.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
      // head glow
      const g = ctx.createRadialGradient(smoothX, smoothY, 0, smoothX, smoothY, 5);
      g.addColorStop(0, 'rgba(240,210,160,0.45)');
      g.addColorStop(1, 'rgba(200,169,126,0)');
      ctx.beginPath();
      ctx.arc(smoothX, smoothY, 5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    requestAnimationFrame(loop);
  }
  loop();

    nameCard.style.left = e.clientX + 'px';
    nameCard.style.top  = e.clientY + 'px';
  });

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const playlist = shuffle(songs);
  let trackIndex = 0;

  const audio     = document.getElementById('bgAudio');
  const audioBtn  = document.getElementById('audioBtn');
  const skipBtn   = document.getElementById('skipBtn');
  const songTitle  = document.getElementById('songTitle');
  const songArtist = document.getElementById('songArtist');
  const songThumb  = document.getElementById('songThumb');
  let playing = false;

  const audioBtnThumb = document.getElementById('audioBtnThumb');

  function loadTrack(index) {
    const t = playlist[index];
    audio.src = t.src;
    songTitle.textContent  = t.title;
    songArtist.textContent = t.artist;
    if (t.thumb) {
      songThumb.style.display = 'block';
      songThumb.src = t.thumb;
      audioBtnThumb.src = t.thumb;
      audioBtnThumb.style.display = 'block';
      audioBtn.style.backgroundImage = '';
    } else {
      songThumb.style.display = 'none';
      songThumb.src = '';
      audioBtnThumb.style.display = 'none';
      audioBtnThumb.src = '';
      audioBtn.style.backgroundImage = '';
    }
  }

  loadTrack(trackIndex);
  audio.loop = false;

  audio.addEventListener('ended', () => {
    trackIndex = (trackIndex + 1) % playlist.length;
    loadTrack(trackIndex);
    if (playing) {
      audio.volume = 0;
      audio.play().then(() => fadeVolume(audio, 0, 0.45, 1000)).catch(() => {});
    }
  });

  audioBtn.addEventListener('click', () => {
    if (!playing) {
      audio.volume = 0;
      audio.play().then(() => {
        playing = true;
        audioBtn.classList.add('playing');
        fadeVolume(audio, 0, 0.45, 2000);
      }).catch(() => {});
    } else {
      fadeVolume(audio, audio.volume, 0, 800, () => {
        audio.pause();
        playing = false;
        audioBtn.classList.remove('playing');
      });
    }
  });

  skipBtn.addEventListener('click', () => {
    const wasPlaying = playing;
    // stop any fades, jump straight to next
    audio.pause();
    audio.volume = 0;
    trackIndex = (trackIndex + 1) % playlist.length;
    loadTrack(trackIndex);
    if (wasPlaying) {
      audio.play().then(() => fadeVolume(audio, 0, 0.45, 800)).catch(() => {});
    }
  });

  const volumeSlider = document.getElementById('volumeSlider');
  volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value / 100;
  });

  function fadeVolume(aud, from, to, dur, cb) {
    const step = (to - from) / (dur / 16);
    let v = from;
    const iv = setInterval(() => {
      v += step;
      if ((step > 0 && v >= to) || (step < 0 && v <= to)) {
        aud.volume = Math.max(0, Math.min(1, to));
        volumeSlider.value = Math.round(aud.volume * 100);
        clearInterval(iv);
        if (cb) cb();
      } else {
        aud.volume = Math.max(0, Math.min(1, v));
        volumeSlider.value = Math.round(aud.volume * 100);
      }
    }, 16);
  }
</script>
